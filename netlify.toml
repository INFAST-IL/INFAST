# ==================== NETLIFY CONFIGURATION ====================

[build]
  publish = "סופי"

# Force HTTPS
[[redirects]]
  from = "http://infast.co.il/*"
  to   = "https://infast.co.il/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.infast.co.il/*"
  to   = "https://infast.co.il/:splat"
  status = 301
  force  = true

# ==================== SECURITY HEADERS ====================
[[headers]]
  for = "/*"

  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://formspree.io; frame-ancestors 'none';"
